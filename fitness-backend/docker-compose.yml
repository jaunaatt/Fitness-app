version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: forgefit-postgres
    environment:
      POSTGRES_DB: forgefit
      POSTGRES_USER: forgefit
      POSTGRES_PASSWORD: forgefit_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forgefit"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
