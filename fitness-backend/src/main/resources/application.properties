# ── Local Development Configuration ──────────────────────────────────────────
# Uses a local PostgreSQL instance (start with: docker-compose up -d)
# Do NOT commit real secrets. Use .env.local or IDE env var injection for dev.

# Database — H2 File-based (No Docker required for local testing)
spring.datasource.url=jdbc:h2:file:./data/forgefit;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=password
spring.datasource.driver-class-name=org.h2.Driver

# Hibernate / JPA configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server
server.port=8080

# JWT — override in dev via IDE environment variable or .env file
# Generate a strong secret: openssl rand -base64 64
jwt.secret=${JWT_SECRET:local-dev-secret-change-this-in-production-must-be-at-least-32-chars}

# CORS — allow the local Vite dev server
cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:5173}
