# ── Production Configuration (active via SPRING_PROFILES_ACTIVE=prod on Render) ──
# All values come from environment variables set in Render's dashboard.
# NEVER hardcode secrets here. NEVER commit this file with real values.

# Database — Neon or Render Postgres (set DATABASE_URL in Render env vars)
# Format: jdbc:postgresql://host:port/dbname?sslmode=require
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Server — Render injects the PORT environment variable
server.port=${PORT:8080}

# JWT — generate with: openssl rand -base64 64
jwt.secret=${JWT_SECRET}

# CORS — set to your Netlify domain, e.g. https://forgefit.netlify.app
cors.allowed-origin=${CORS_ALLOWED_ORIGIN}
